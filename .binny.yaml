# only pull in version updates that were released more than a week ago (low-pass filter for quickly-retracted releases)
cooldown: 7d
tools:
  - name: binny
    version:
      want: v0.13.2
    method: github-release
    with:
      repo: anchore/binny

  - name: task
    version:
      want: v3.51.1
    method: github-release
    with:
      repo: go-task/task

  # note: our lint config relies on rules/behavior introduced after v2.11.4 — notably, gosec G704 SSRF taint
  # analysis fires under v2.11.4 in code that lints clean under v2.12.2.
  - name: golangci-lint
    version:
      want: v2.12.2
    method: github-release
    with:
      repo: golangci/golangci-lint

  - name: goreleaser
    version:
      want: v2.16.0
    method: github-release
    with:
      repo: goreleaser/goreleaser

  - name: syft
    version:
      want: v1.46.0
    method: github-release
    with:
      repo: anchore/syft

  - name: bouncer
    version:
      want: v0.4.0
    method: github-release
    with:
      repo: wagoodman/go-bouncer

  - name: chronicle
    version:
      want: v0.13.1
    method: github-release
    with:
      repo: anchore/chronicle

  - name: glow
    version:
      want: v2.1.2
    method: github-release
    with:
      repo: charmbracelet/glow

  - name: gh
    version:
      want: v2.95.0
    method: github-release
    with:
      repo: cli/cli

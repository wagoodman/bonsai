name: "Release"

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: tag the latest commit on main with the given version (prefixed with v)
        required: true

run-name: ${{ github.event.inputs.version }}

jobs:
  version-available:
    permissions:
      contents: read # required for the reusable workflow to check out the repo and verify the version
    uses: anchore/workflows/.github/workflows/check-version-available.yaml@b0c30a80409130d329aaa356fd64a34d8c0b3375 # v0.7.2
    with:
      version: ${{ github.event.inputs.version }}

  check-gate:
    permissions:
      checks: read # required for getting the status of specific check names
      contents: read
    uses: anchore/workflows/.github/workflows/check-gate.yaml@d10c79ed76d583eb03f188cdc30ed6f8a45184f7 # v0.7.2
    with:
      # these are checks that should be run on pull-request and merges to main.
      # we do NOT want to kick off a release if these have not been verified on main.
      # Please see the validations.yaml workflow for the names that should be used here.
      checks: '["Build snapshot artifacts", "Static analysis", "Unit tests", "Integration tests"]'

  release:
    needs: [check-gate, version-available]
    environment: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # required for creating the GitHub release and pushing the version tag
      packages: write # required for publishing release artifacts to GitHub packages
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0 # we need the full history to reason about changelogs and tags
          # persist credentials so we can push the version tag below using the default GITHUB_TOKEN
          persist-credentials: true

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Tag release
        # tagging is done here (not via a separate deploy key / TAG_TOKEN secret); the default GITHUB_TOKEN
        # persisted by checkout has the contents:write permission needed to push the tag.
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Build & publish release artifacts
        run: make ci-release
        env:
          # for creating the release (requires write access to packages and content)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: artifacts
          path: dist/**/*

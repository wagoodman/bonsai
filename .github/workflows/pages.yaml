name: "Docs"
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/pages.yaml"

permissions: {}

# allow one concurrent deployment, don't cancel an in-progress publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  Build:
    name: "Build docs site"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # installs go and the binny-pinned tools (hugo included, see .binny.yaml)
      - uses: ./.github/actions/bootstrap

      - name: Build site
        run: make docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/public

  Deploy:
    name: "Deploy to Pages"
    needs: Build
    runs-on: ubuntu-24.04
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from this workflow
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

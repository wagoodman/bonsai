name: "Docs"
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/pages.yaml"

permissions: {}

# allow one concurrent deployment, don't cancel an in-progress publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  Build:
    name: "Build docs site"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      # keep in sync with what the site is developed against locally
      HUGO_VERSION: "0.150.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # go is needed for hugo modules to fetch the hextra theme
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.x"
          check-latest: true

      - name: Install Hugo (extended)
        run: |
          url="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          curl -sSfL "$url" -o /tmp/hugo.tar.gz
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo install /tmp/hugo /usr/local/bin/hugo
          hugo version

      # build through the taskfile so the build command is single-sourced with local dev
      - name: Build site
        run: |
          curl -sSfL https://get.anchore.io/binny | sh -s -- -b .tool
          .tool/binny install task -q
          .tool/task docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/public

  Deploy:
    name: "Deploy to Pages"
    needs: Build
    runs-on: ubuntu-24.04
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from this workflow
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
